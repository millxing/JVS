<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Join The List</title>
<link href="https://fonts.googleapis.com/css2?family=Merriweather:ital,wght@0,700;1,700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #1B3A5C;
    --cream: #F0EBE1;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    background: var(--cream);
  }

  body {
    padding: 24px;
  }

  .element {
    display: inline-flex;
    flex-direction: column;
    align-items: center;
    color: var(--navy);
  }

  .headline {
    font-family: "Merriweather", serif;
    font-size: 56px;
    line-height: 0.95;
    font-style: italic;
    font-weight: 700;
    letter-spacing: -0.05em;
  }

  .email {
    margin-top: 10px;
    font-family: "Inter", sans-serif;
    font-size: 24px;
    line-height: 1.15;
    font-weight: 500;
  }
</style>
</head>
<body>
  <div class="element">
    <div class="headline">Join the list!</div>
    <div class="email">jvanscoyoc0@gmail.com</div>
  </div>
</body>
</html>
