<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thank You, Endorsers</title>
<link href="https://fonts.googleapis.com/css2?family=Merriweather:ital,wght@0,700;1,700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #1B3A5C;
    --cream: #F0EBE1;
    --gold: #C8952E;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    background: var(--cream);
  }

  body {
    padding: 24px;
  }

  .element {
    display: inline-block;
    color: var(--gold);
    font-family: "Merriweather", serif;
    font-size: 64px;
    line-height: 0.95;
    font-style: italic;
    font-weight: 700;
    letter-spacing: -0.05em;
  }
</style>
</head>
<body>
  <div class="element">Thank you, Endorsers!</div>
</body>
</html>
