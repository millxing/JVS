<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VanScoyoc Postcard Blank Portrait</title>
<style>
  :root {
    --paper: #f5f1ea;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    display: grid;
    place-items: center;
    padding: 24px;
    background: #d7d2c8;
    font-family: "Inter", sans-serif;
  }

  .card {
    width: 6in;
    height: 9in;
    background: var(--paper);
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.18), 0 2px 10px rgba(0, 0, 0, 0.08);
  }

  @media print {
    body {
      background: #fff;
      padding: 0;
    }

    .card {
      box-shadow: none;
    }
  }

  @media (max-width: 760px) {
    body {
      padding: 0;
    }

    .card {
      width: min(100vw, 66.6667vh);
      height: min(150vw, 100vh);
      box-shadow: none;
    }
  }
</style>
</head>
<body>
  <main class="card" aria-label="Blank portrait postcard"></main>
</body>
</html>
