<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thank You, Endorsers Portrait 02</title>
<link href="https://fonts.googleapis.com/css2?family=Merriweather:ital,wght@0,700;0,900;1,700;1,900&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #1b3a5c;
    --cream: #faf7f2;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
  }

  body {
    min-height: 100vh;
    display: grid;
    place-items: center;
    padding: 24px;
    background: #d7d2c8;
    color: var(--navy);
    font-family: "Inter", sans-serif;
  }

  .sheet {
    width: 6in;
    height: 9in;
    background: var(--cream);
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.18), 0 2px 10px rgba(0, 0, 0, 0.08);
    overflow: hidden;
  }

  .inner {
    height: 100%;
    padding: 24px 26px 20px;
    display: flex;
    flex-direction: column;
  }

  .title {
    margin: 0 0 10px;
    color: var(--navy);
    font-family: "Merriweather", serif;
    font-size: 44px;
    line-height: 0.95;
    font-style: italic;
    font-weight: 700;
    letter-spacing: -0.04em;
    text-align: center;
  }

  .orgs {
    margin: 0 0 14px;
    color: var(--navy);
    font-size: 12px;
    line-height: 1.18;
    font-weight: 800;
    text-align: center;
    text-transform: none;
  }

  .featured {
    margin: 0 0 16px;
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 6px 18px;
  }

  .featured-item {
    color: var(--navy);
    font-size: 10.5px;
    line-height: 1.2;
    font-weight: 600;
  }

  .featured-item .name {
    font-weight: 800;
  }

  .all {
    flex: 1 1 auto;
    min-height: 0;
    color: var(--navy);
    font-size: 9px;
    line-height: 1.13;
    font-weight: 700;
    letter-spacing: -0.01em;
    overflow: hidden;
  }

  .all span {
    white-space: normal;
  }

  .footer {
    margin-top: 12px;
    display: grid;
    grid-template-columns: 1fr auto;
    align-items: end;
    gap: 14px;
  }

  .cta {
    color: var(--navy);
    min-width: 0;
    text-align: center;
  }

  .cta .join {
    margin: 0;
    font-family: "Merriweather", serif;
    font-size: 31px;
    line-height: 0.95;
    font-style: italic;
    font-weight: 700;
    letter-spacing: -0.04em;
  }

  .cta .email {
    margin-top: 8px;
    font-size: 12px;
    line-height: 1.2;
    font-weight: 500;
  }

  .qr {
    width: 76px;
    height: 76px;
    padding: 4px;
    border: 2px solid rgba(27, 58, 92, 0.22);
    background: #fff;
    flex: 0 0 auto;
  }

  .qr img {
    display: block;
    width: 100%;
    height: 100%;
    object-fit: contain;
  }

  @media print {
    body {
      padding: 0;
      background: #fff;
    }

    .sheet {
      box-shadow: none;
    }
  }

  @media (max-width: 760px) {
    body {
      padding: 0;
    }

    .sheet {
      width: min(100vw, 66.6667vh);
      height: min(150vw, 100vh);
      box-shadow: none;
    }

    .title {
      font-size: clamp(32px, 7vw, 40px);
    }

    .cta .join {
      font-size: clamp(24px, 5.6vw, 28px);
    }
  }
</style>
</head>
