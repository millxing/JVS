<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VanScoyoc Postcard — 6x9 Blank</title>
<style>
  :root {
    --navy: #1B3A5C;
    --cream: #FAF7F2;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #e0e0e0;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 20px;
    gap: 40px;
    font-family: 'Inter', sans-serif;
  }

  .label {
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    color: #888;
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-bottom: 8px;
  }

  .card-wrapper {
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .postcard {
    width: 1260px;
    height: 840px;
    position: relative;
    overflow: hidden;
    box-shadow: 0 8px 32px rgba(0,0,0,0.2), 0 2px 8px rgba(0,0,0,0.1);
  }

  .front {
    background: var(--navy);
  }

  .back {
    background: var(--cream);
  }

  /* Print styles */
  @media print {
    body {
      background: white;
      padding: 0;
      gap: 0;
    }
    .label { display: none; }
    .card-wrapper { margin: 0; }
    .postcard {
      box-shadow: none;
      width: 9in;
      height: 6in;
      page-break-after: always;
    }
  }
</style>
</head>
<body>

<div class="card-wrapper">
  <div class="label">Front Side (6" x 9")</div>
  <div class="postcard front"></div>
</div>

<div class="card-wrapper">
  <div class="label">Back Side (6" x 9")</div>
  <div class="postcard back"></div>
</div>

</body>
</html>
