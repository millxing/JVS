<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Postcard Elements 01</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --paper: #F0EBE1;
    --navy: #1B3A5C;
  }

  * {
    box-sizing: border-box;
  }

  html,
  body {
    margin: 0;
    min-height: 100%;
    background: var(--paper);
  }

  body {
    color: var(--navy);
  }

  .sheet {
    min-height: 100vh;
    padding: 48px 40px 64px;
    display: grid;
    align-content: start;
    gap: 72px;
    background: var(--paper);
  }

  .lockup {
    display: inline-grid;
    justify-items: start;
    gap: 10px;
    width: fit-content;
  }

  .headline {
    margin: 0;
    font-size: clamp(68px, 11vw, 152px);
    line-height: 0.9;
    text-transform: uppercase;
    letter-spacing: -0.045em;
    color: var(--navy);
  }

  .subline {
    margin: 0;
    font-size: clamp(26px, 4.5vw, 62px);
    line-height: 1;
    letter-spacing: -0.03em;
    color: var(--navy);
  }

  .single-line {
    margin: 0;
    font-size: clamp(58px, 8vw, 120px);
    line-height: 1;
    letter-spacing: -0.04em;
    color: var(--navy);
    white-space: nowrap;
  }

  .lockup-arial .headline,
  .lockup-arial .subline,
  .lockup-arial .single-line {
    font-family: Arial, "Helvetica Neue", Helvetica, sans-serif;
    font-weight: 700;
  }

  .lockup-montserrat .headline,
  .lockup-montserrat .subline {
    font-family: "Montserrat", Arial, sans-serif;
  }

  .lockup-montserrat .headline {
    font-weight: 800;
  }

  .lockup-montserrat .subline {
    font-weight: 600;
    justify-self: center;
    text-align: center;
  }

  @media print {
    .sheet {
      min-height: auto;
      padding: 0.5in;
      gap: 0.75in;
    }
  }
</style>
</head>
<body>
  <main class="sheet">
    <section class="lockup lockup-arial" aria-label="Brookline By Design">
      <h1 class="single-line">Brookline By Design</h1>
    </section>

    <section class="lockup lockup-montserrat" aria-label="Brookline For Responsible Government">
      <h2 class="headline">Brookline</h2>
      <p class="subline">For Responsible Government</p>
    </section>
  </main>
</body>
</html>
