<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Instagram 05 Community Color</title>
<link rel="stylesheet" href="./shared.css">
<style>
  .base {
    position: absolute;
    inset: 0;
    background:
      radial-gradient(circle at top right, rgba(232, 185, 77, 0.25), transparent 22%),
      linear-gradient(180deg, #15314f 0%, #1b3a5c 100%);
  }

  .photo-wrap {
    position: absolute;
    left: 64px;
    top: 126px;
    width: 440px;
    height: 600px;
    border-radius: 34px;
    overflow: hidden;
    box-shadow: 0 20px 70px rgba(0, 0, 0, 0.25);
    border: 1px solid rgba(255, 255, 255, 0.16);
  }

  .photo-wrap img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .copy {
    position: absolute;
    right: 64px;
    top: 170px;
    width: 470px;
  }

  .eyebrow {
    margin: 0 0 14px;
    font-size: 18px;
    font-weight: 800;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--gold-light);
  }

  h1 {
    margin: 0;
    font-size: 76px;
    line-height: 0.95;
    letter-spacing: -0.06em;
    font-weight: 700;
  }

  p {
    margin: 20px 0 0;
    font-size: 28px;
    line-height: 1.28;
    color: rgba(255, 255, 255, 0.84);
  }

  .stat {
    margin-top: 34px;
    padding: 20px 22px;
    border-left: 5px solid var(--gold-light);
    background: rgba(255, 255, 255, 0.08);
    font-size: 22px;
    line-height: 1.3;
    font-weight: 600;
  }
</style>
</head>
<body>
  <main class="post">
    <div class="base"></div>
    <div class="brand-bar">
      <div class="brand-mark">
        <img src="../assets/jvs2.png" alt="John VanScoyoc portrait">
        <div class="brand-text">
          <strong>John VanScoyoc</strong>
          <span>Brookline Select Board</span>
        </div>
      </div>
      <div class="election-pill">Independent voice</div>
    </div>

    <section class="photo-wrap">
      <img src="../assets/turkey.png" alt="Colorful turkey sculpture">
    </section>

    <section class="copy">
      <p class="eyebrow sans">Creative Brookline</p>
      <h1 class="serif">A town with real character.</h1>
      <p>Public art, neighborhood energy, local traditions, and the kind of civic life worth protecting.</p>
      <div class="stat sans">Experience and independence matter because Brookline should stay unmistakably Brookline.</div>
    </section>
  </main>
</body>
</html>
