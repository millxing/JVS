<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Instagram 03 Journalism</title>
<link rel="stylesheet" href="./shared.css">
<style>
  .base {
    position: absolute;
    inset: 0;
    background:
      linear-gradient(135deg, rgba(232, 185, 77, 0.12), transparent 35%),
      linear-gradient(180deg, #13283f 0%, #1b3a5c 100%);
  }

  .grid {
    position: absolute;
    inset: 118px 56px 56px;
    display: grid;
    grid-template-columns: 0.92fr 1.08fr;
    gap: 34px;
  }

  .photo-card {
    position: relative;
    border-radius: 30px;
    overflow: hidden;
    border: 1px solid rgba(255, 255, 255, 0.14);
    background: rgba(255, 255, 255, 0.08);
  }

  .photo-card img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .copy {
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 24px 8px 24px 4px;
  }

  .eyebrow {
    margin: 0 0 12px;
    font-size: 18px;
    line-height: 1;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    font-weight: 700;
    color: var(--gold-light);
  }

  h1 {
    margin: 0;
    font-size: 70px;
    line-height: 0.98;
    letter-spacing: -0.05em;
    font-weight: 700;
  }

  p {
    margin: 18px 0 0;
    font-size: 28px;
    line-height: 1.3;
    color: rgba(255, 255, 255, 0.82);
  }

  .rule {
    width: 140px;
    height: 6px;
    border-radius: 999px;
    background: var(--gold-light);
    margin: 28px 0 0;
  }

  .gold-frame {
    inset: 22px;
  }
</style>
</head>
<body>
  <main class="post">
    <div class="base"></div>
    <div class="gold-frame"></div>
    <div class="brand-bar">
      <div class="brand-mark">
        <img src="../assets/jvs2.png" alt="John VanScoyoc portrait">
        <div class="brand-text">
          <strong>John VanScoyoc</strong>
          <span>Brookline Select Board</span>
        </div>
      </div>
      <div class="election-pill">Trusted leadership</div>
    </div>

    <section class="grid">
      <div class="photo-card">
        <img src="../assets/profession.png" alt="Journalism retirement collage">
      </div>
      <div class="copy">
        <p class="eyebrow">A record of service</p>
        <h1 class="serif">Journalist.<br>Neighbor.<br>Advocate.</h1>
        <div class="rule"></div>
        <p>Decades of listening, asking hard questions, and showing up for Brookline.</p>
      </div>
    </section>
  </main>
</body>
</html>
