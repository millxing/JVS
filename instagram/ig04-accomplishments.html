<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Instagram 04 Accomplishments</title>
<link rel="stylesheet" href="./shared.css">
<style>
  .base {
    position: absolute;
    inset: 0;
    background: linear-gradient(180deg, #f8f3eb 0%, #f2ecdf 100%);
  }

  .photo {
    position: absolute;
    left: 56px;
    right: 56px;
    top: 126px;
    height: 420px;
    border-radius: 28px;
    overflow: hidden;
    background: #d9d3c8;
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.14);
  }

  .photo img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .copy {
    position: absolute;
    left: 64px;
    right: 64px;
    bottom: 74px;
    color: var(--navy);
  }

  .eyebrow {
    margin: 0 0 12px;
    color: var(--gold);
    font-size: 17px;
    font-weight: 800;
    letter-spacing: 0.16em;
    text-transform: uppercase;
  }

  h1 {
    margin: 0;
    font-size: 60px;
    line-height: 1.02;
    letter-spacing: -0.045em;
    font-weight: 700;
  }

  .body {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 16px 24px;
    margin-top: 20px;
    font-size: 24px;
    line-height: 1.32;
    font-weight: 600;
    color: #435162;
  }

  .body div::before {
    content: "";
    display: inline-block;
    width: 9px;
    height: 9px;
    margin-right: 12px;
    border-radius: 50%;
    background: var(--gold);
    transform: translateY(-1px);
  }

  .top-pill {
    position: absolute;
    top: 34px;
    right: 44px;
    z-index: 5;
    padding: 12px 18px;
    border-radius: 999px;
    background: rgba(27, 58, 92, 0.92);
    color: white;
    font-size: 18px;
    font-weight: 700;
  }
</style>
</head>
<body>
  <main class="post">
    <div class="base"></div>
    <div class="top-pill">Results that matter</div>
    <section class="photo">
      <img src="../assets/accomplish.png" alt="Ribbon cutting and civic event">
    </section>
    <section class="copy">
      <p class="eyebrow sans">Working for Brookline</p>
      <h1 class="serif">Experience you can point to.</h1>
      <div class="body sans">
        <div>Protecting neighborhood character</div>
        <div>Supporting local business and vitality</div>
        <div>Advocating for practical infrastructure fixes</div>
        <div>Focusing on steady, independent judgment</div>
      </div>
    </section>
  </main>
</body>
</html>
