<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Instagram 01 Spring Sign</title>
<link rel="stylesheet" href="./shared.css">
<style>
  .photo-shell {
    position: absolute;
    inset: 92px 44px 126px;
    border-radius: 34px;
    overflow: hidden;
    background: var(--navy-dark);
  }

  .photo-shell::after {
    content: "";
    position: absolute;
    inset: 0;
    background:
      linear-gradient(180deg, rgba(18, 40, 64, 0.1) 0%, rgba(18, 40, 64, 0.05) 34%, rgba(18, 40, 64, 0.78) 100%);
  }

  .headline-card {
    position: absolute;
    left: 64px;
    right: 64px;
    bottom: 62px;
    z-index: 2;
    padding: 30px 34px 26px;
    border-radius: 26px;
    background: rgba(27, 58, 92, 0.88);
    border: 1px solid rgba(255, 255, 255, 0.14);
    backdrop-filter: blur(10px);
  }

  .eyebrow {
    margin: 0 0 10px;
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--gold-light);
  }

  h1 {
    margin: 0;
    font-size: 66px;
    line-height: 1.02;
    letter-spacing: -0.045em;
    font-weight: 700;
  }

  h1 span {
    color: var(--gold-light);
  }

  p {
    margin: 16px 0 0;
    font-size: 28px;
    line-height: 1.25;
    color: rgba(255, 255, 255, 0.84);
  }
</style>
</head>
<body>
  <main class="post">
    <div class="gold-frame"></div>
    <div class="brand-bar">
      <div class="brand-mark">
        <img src="../assets/jvs2.png" alt="John VanScoyoc portrait">
        <div class="brand-text">
          <strong>John VanScoyoc</strong>
          <span>Brookline Select Board</span>
        </div>
      </div>
      <div class="election-pill">May 5, 2026</div>
    </div>

    <section class="photo-shell">
      <img class="photo-fill" src="../assets/flowers.png" alt="Campaign sign among spring flowers">
      <div class="headline-card">
        <p class="eyebrow">Spring in Brookline</p>
        <h1 class="serif">Re-Elect John <span>VanScoyoc</span></h1>
        <p>Experience. Independence. Community.</p>
      </div>
    </section>

    <div class="footer-tag">millxing.github.io/JVS</div>
  </main>
</body>
</html>
