<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thank You, Endorsers</title>
<link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@700;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#111111;
    --paper:#f5f1ea;
    --line:#d1c6b5;
    --accent:#1b3a5c;
    --muted:#3d3d3d;
    --sage:#7a9e7e;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    background:#d7d2c8;
    font-family:"Inter",sans-serif;
    color:var(--ink);
    min-height:100vh;
    display:grid;
    place-items:center;
    padding:24px;
  }
  .sheet{
    width:9in;
    height:6in;
    background:var(--paper);
    position:relative;
    overflow:hidden;
    box-shadow:0 20px 60px rgba(0,0,0,.18),0 2px 10px rgba(0,0,0,.08);
  }
  .inner{
    position:absolute;
    inset:0;
    padding:34px 42px 28px;
    display:flex;
    flex-direction:column;
  }
  h1{
    margin:0 0 14px;
    font-family:"Merriweather",serif;
    font-size:46px;
    line-height:1;
    font-weight:700;
    color:#111;
    font-style:italic;
    letter-spacing:-0.02em;
  }
  .rule{
    width:150px;
    height:2px;
    background:var(--line);
    margin-bottom:16px;
  }
  .featured{
    margin:0 0 12px;
    display:grid;
    grid-template-columns:repeat(2,minmax(0,1fr));
    gap:4px 18px;
  }
  .featured .item{
    font-size:12px;
    line-height:1.15;
    color:var(--muted);
  }
  .featured .name{
    color:var(--accent);
    font-weight:700;
    font-size:13.5px;
  }
  .featured .title{
    color:var(--muted);
    font-weight:500;
  }
  .all{
    margin-top:6px;
    font-size:12px;
    line-height:1.12;
    color:var(--muted);
    column-count:1;
    column-gap:0;
    flex:1;
    overflow:hidden;
    font-weight:600;
  }
  .all span{
    white-space:nowrap;
  }
  .all .sep{
    display:none;
  }
  .footer{
    margin-top:8px;
    font-size:10px;
    color:#6d6558;
    letter-spacing:.08em;
    text-transform:uppercase;
  }
  @media print{
    body{background:#fff;padding:0}
    .sheet{box-shadow:none;width:9in;height:6in}
  }
  @media (max-width: 1100px){
    body{padding:0}
    .sheet{width:100vw;height:66.6667vw;box-shadow:none}
  }
</style>
</head>
