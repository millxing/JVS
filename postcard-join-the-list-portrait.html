<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Join the List Portrait Postcard</title>
<link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@700;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --paper: #f5f1ea;
    --accent: #1b3a5c;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
  }

  body {
    min-height: 100vh;
    display: grid;
    place-items: center;
    padding: 24px;
    background: #d7d2c8;
    font-family: "Inter", sans-serif;
  }

  .card {
    width: 6in;
    height: 9in;
    background: var(--paper);
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.18), 0 2px 10px rgba(0, 0, 0, 0.08);
    display: grid;
    place-items: center;
    padding: 36px;
  }

  .message {
    margin: 0;
    color: var(--accent);
    font-family: "Merriweather", serif;
    font-size: 56px;
    line-height: 0.95;
    font-style: italic;
    font-weight: 700;
    text-align: center;
    letter-spacing: -0.03em;
  }

  @media print {
    body {
      background: #fff;
      padding: 0;
    }

    .card {
      box-shadow: none;
    }
  }

  @media (max-width: 760px) {
    body {
      padding: 0;
    }

    .card {
      width: min(100vw, 66.6667vh);
      height: min(150vw, 100vh);
      box-shadow: none;
    }

    .message {
      font-size: clamp(36px, 8vw, 56px);
    }
  }
</style>
</head>
<body>
  <main class="card" aria-label="Join the list portrait postcard">
    <h1 class="message">Join the list!</h1>
  </main>
</body>
</html>
